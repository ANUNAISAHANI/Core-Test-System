<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Examination - CoreTest System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .exam-workspace { display: grid; grid-template-columns: 3fr 1fr; gap: 20px; max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .question-panel { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); min-height: 350px; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* Right Side Navigation Grid Box */
        .navigation-sidebar { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); height: fit-content; text-align: center; }
        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; margin-top: 1.2rem; }
        
        .matrix-box { height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: 600; font-size: 0.95rem; cursor: pointer; border: 2px solid #e2e8f0; background: #f8fafc; color: #64748b; transition: all 0.2s ease; }
        .matrix-box:hover { border-color: #667eea; color: #667eea; }
        
        /* Dynamic Status Colors */
        .matrix-box.current { border-color: #4f46e5 !important; background: #eef2ff !important; color: #4f46e5 !important; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2); }
        .matrix-box.answered { background: #10b981 !important; border-color: #10b981 !important; color: white !important; }
        .matrix-box.skipped { background: #ef4444 !important; border-color: #ef4444 !important; color: white !important; }

        .option-card { display: flex; align-items: center; gap: 12px; padding: 14px; border: 2px solid #f1f5f9; border-radius: 8px; cursor: pointer; margin-bottom: 12px; transition: all 0.2s ease; }
        .option-card:hover { background: #f8fafc; border-color: #cbd5e1; }
        .option-card input[type="radio"] { width: 18px; height: 18px; cursor: pointer; accent-color: #4f46e5; }
        .option-card.selected { border-color: #4f46e5; background: #f5f3ff; }

        .control-btns { display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #f1f5f9; }
        .timer-badge { font-size: 1.5rem; font-weight: 700; color: #334155; background: #f1f5f9; padding: 6px 16px; border-radius: 8px; font-family: monospace; }
        
        @media (max-width: 768px) { .exam-workspace { grid-template-columns: 1fr; } }
    </style>
</head>
<body style="background: #f8fafc;">

    <div style="background: white; border-bottom: 1px solid #e2e8f0; padding: 1rem 0;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <h2 id="examTitleDisplay" style="margin:0; color:#1e293b;">🎯 Live Paper loading...</h2>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span style="font-size: 0.9rem; color:#64748b; font-weight: 500;">⏱️ Time Remaining:</span>
                <div id="timerDisplay" class="timer-badge">00:00:00</div>
            </div>
        </div>
    </div>

    <div class="exam-workspace">
        <div class="question-panel" id="mainArena">
            <div id="activeQuestionContainer">
                </div>
            
            <div class="control-btns">
                <button id="prevQuestionBtn" class="btn btn-outline" style="padding: 10px 20px;">⬅️ Previous</button>
                <button id="clearSelectionBtn" class="btn btn-outline" style="padding: 10px 20px; color: #ef4444; border-color: #fca5a5;">❌ Clear Option</button>
                <button id="nextQuestionBtn" class="btn" style="background:#4f46e5; padding: 10px 25px;">Next ➡️</button>
            </div>
        </div>

        <div class="navigation-sidebar">
    <h4 style="margin:0; color:#1e293b; font-size: 1.05rem;">📋 Question Navigation</h4>
    <p style="font-size: 0.75rem; color:#94a3b8; margin: 4px 0 12px 0;">Click any grid box to jump instantly</p>
    
    <div style="display: flex; flex-direction: column; gap: 8px; font-size: 0.8rem; text-align: left; background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 12px;">
        <div style="display: flex; align-items: center; gap: 8px;">
            <div style="width: 14px; height: 14px; background: #eef2ff; border: 2px solid #4f46e5; border-radius: 3px;"></div>
            <span style="color: #4f46e5; font-weight: 600;">Active: Currently Viewing</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <div style="width: 14px; height: 14px; background: #10b981; border-radius: 3px;"></div>
            <span style="color: #047857; font-weight: 600;">Green: Answered & Saved</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <div style="width: 14px; height: 14px; background: #ef4444; border-radius: 3px;"></div>
            <span style="color: #b91c1c; font-weight: 600;">Red: Skipped / Unanswered</span>
        </div>
        <div style="display: flex; align-items: center; gap: 8px;">
            <div style="width: 14px; height: 14px; background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 3px;"></div>
            <span style="color: #64748b; font-weight: 500;">Grey: Not Visited Yet</span>
        </div>
    </div>
    <div class="matrix-grid" id="questionMatrixGrid">
        </div>
    
    <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 1.5rem 0;">
    <button id="submitExamBtn" class="btn btn-danger" style="width: 100%; padding: 12px; background: #ef4444; font-weight: 700; font-size: 1rem; letter-spacing: 0.5px;">🔴 Final Submit Paper</button>
    </div>
    </div>

    <script src="{{ url_for('static', filename='exam.js') }}"></script>
</body>
</html>
