<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreTest System - Reset Password</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>🔑 Reset Password</h2>
                <p>Enter your email to request a new password</p>
            </div>
            
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" required>
                </div>
                <button type="submit" id="resetSubmitBtn" class="btn btn-primary btn-block">Send Reset Link</button>
            </form>

            <div class="divider"><span>OR</span></div>
            
            <a href="/" class="btn btn-outline btn-block" style="text-align: center; text-decoration: none; display: block;">Back to Login</a>
            
            <div class="auth-footer">
                <p>Secured CoreTest Authentication Stream</p>
            </div>
        </div>
    </div>
   <script src="{{ url_for('static', filename='login.js') }}"></script> 
</body>
</html>
